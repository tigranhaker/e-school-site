<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">

    <title>Форма входа</title>

</head>
<body>

    <div class="login-card">
        <h1 class="title">Մուտք</h1>
        
        <form>
            <div class="input-group">
                <input type="email" placeholder="Էլ. փոստ" required>
            </div>
            
            <div class="input-group">
                <input type="password" placeholder="Գաղտնաբառ" required>

            <div class="links">
                <a href="#" class="link">Գրանցվել</a>
                <a href="#" class="link">Մոռացե՞լ եք գաղտնաբառը</a>

            <div class="captcha-container">
                <div class="captcha-left">
                    <div class="checkbox"></div>
                    <span class="captcha-text">Ես ռոբոտ չեմ</span>
                </div>
                <div class="captcha-right">
                    <img src="https://www.gstatic.com/recaptcha/api2/logo_48.png" alt="reCAPTCHA" class="captcha-logo">
                    <div class="recaptcha-label">reCAPTCHA</div>
                    <div class="captcha-policy">
                        <a href="#">Գաղտնիություն</a> - <a href="#">Պայմաններ</a>
                    </div>
                </div>
            </div>

            
            <a class="login-btn" href="C:\Users\Admin\Desktop\school\index2.html" class="login-button" target="_blank"> Մուտք</a>
        </form>
    </div>
