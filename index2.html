    </div>

    <header class="main-header">

                <img src="foto/logo.PNG" alt="logo" class="header-logo">

    <main class="content-wrapper">

                    <a class="action-btn" href="C:\Users\Admin\Desktop\school\index3.html" class="login-button" target="_blank">Օրագիր</a>
                    <button class="action-btn">Կիսամյակներ</button>

                    <button class="action-btn">Հեռացնել</button>
                </div>
            </div>

            <div class="add-box">
                <div class="plus-circle">+</div>
                <span class="add-label">Ավելացնել</span>
            </div>
        </div>
